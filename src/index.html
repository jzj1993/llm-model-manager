<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型检查器</title>
  <link rel="stylesheet" href="../node_modules/highlight.js/styles/github-dark.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="top-fixed">
      <h1>🤖 模型检查器</h1>
      <div class="section-title">配置列表</div>
      <div class="list-toolbar">
        <div class="toolbar-left">
          <input id="selectAllConfigs" class="row-checkbox" type="checkbox" onchange="toggleSelectAll(this.checked)">
          <span>全选</span>
          <span id="selectedCount">已选 0 项</span>
        </div>
        <div class="toolbar-right">
          <button id="exportSelectedButton" class="button" onclick="exportSelectedItems()" disabled>导出选中模型</button>
        </div>
      </div>
    </div>

    <div class="list-scroll">
      <div class="provider-list" id="providerList">
        <div class="empty-state">暂无配置，点击下方按钮添加配置</div>
      </div>
    </div>

    <div class="bottom-fixed">
      <button class="button" onclick="openProviderModal()">+ 添加供应商</button>
    </div>
  </div>

  <div class="modal" id="providerModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="providerModalTitle">添加供应商</div>
        <button class="close-button" onclick="closeProviderModal()">&times;</button>
      </div>

      <div class="form-group">
        <label for="providerName">供应商名称</label>
        <input type="text" id="providerName" placeholder="例如: OpenAI 官方">
      </div>

      <div class="form-group">
        <label for="apiType">接口类型</label>
        <select id="apiType" onchange="updateDefaults()">
          <option value="openai">OpenAI 兼容接口</option>
          <option value="anthropic">Anthropic 接口</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="url">API URL</label>
          <input type="text" id="url" list="urlHistory" placeholder="https://api.openai.com">
          <datalist id="urlHistory"></datalist>
        </div>

        <div class="form-group">
          <label for="endpoint">API 端点</label>
          <input type="text" id="endpoint" list="endpointHistory" placeholder="/v1/chat/completions">
          <datalist id="endpointHistory"></datalist>
        </div>
      </div>

      <div class="form-group">
        <label for="apiKey">API Key (可选)</label>
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>

      <div class="modal-footer">
        <button class="button button-secondary" onclick="closeProviderModal()">取消</button>
        <button class="button" onclick="saveProvider()">保存供应商</button>
      </div>
    </div>
  </div>

  <div class="modal" id="modelModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modelModalTitle">添加模型</div>
        <button class="close-button" onclick="closeModelModal()">&times;</button>
      </div>

      <div class="form-group">
        <label for="modelName">模型 ID</label>
        <input type="text" id="modelName" list="modelNameHistory" placeholder="例如: gpt-5.4">
        <datalist id="modelNameHistory"></datalist>
      </div>

      <div class="form-group">
        <label for="modelDisplayName">模型名称（可选）</label>
        <input type="text" id="modelDisplayName" placeholder="例如: GPT-5.4 主模型，不填则使用模型 ID">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="contextWindow">Context Window (可选)</label>
          <input type="number" id="contextWindow" placeholder="例如: 128000">
        </div>
        <div class="form-group">
          <label for="maxTokens">Max Tokens (可选)</label>
          <input type="number" id="maxTokens" placeholder="例如: 8192">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="reasoningMode">Reasoning (可选)</label>
          <select id="reasoningMode">
            <option value="">自动</option>
            <option value="true">启用</option>
            <option value="false">禁用</option>
          </select>
        </div>
        <div class="form-group">
          <label for="inputTypes">输入类型 (可选，逗号分隔)</label>
          <input type="text" id="inputTypes" placeholder="例如: text,image">
        </div>
      </div>

      <div class="modal-footer">
        <button class="button button-secondary" onclick="closeModelModal()">取消</button>
        <button class="button" onclick="saveModel()">保存模型</button>
      </div>
    </div>
  </div>

  <div class="modal" id="exportModal">
    <div class="modal-content export-modal-content">
      <div class="modal-header">
        <div class="modal-title" id="exportTitle">导出</div>
        <button class="close-button" onclick="closeExportModal()">&times;</button>
      </div>

      <div class="form-group">
        <div class="export-layout">
          <div id="exportFormatList" class="export-format-list"></div>
          <div class="export-preview-panel">
            <div class="code-type">类型: <span id="exportTypeLabel">文本</span></div>
            <pre id="exportCode" class="code-viewer"></pre>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="button button-secondary" onclick="closeExportModal()">关闭</button>
        <button class="button" onclick="copyExportContent()">复制内容</button>
      </div>
    </div>
  </div>

  <script src="exporters/base-exporter.js"></script>
  <script src="exporters/exporter-registry.js"></script>
  <script src="exporters/model-defaults.js"></script>
  <script src="exporters/cc-switch-exporter.js"></script>
  <script src="exporters/cc-switch-deeplink-exporter.js"></script>
  <script src="exporters/openclaw-exporter.js"></script>
  <script src="exporters/openclaw-cli-exporter.js"></script>
  <script src="renderer/state.js"></script>
  <script src="renderer/utils.js"></script>
  <script src="renderer/data-export.js"></script>
  <script src="renderer/interactions.js"></script>
  <script src="renderer/modals.js"></script>
  <script src="renderer/render-bootstrap.js"></script>
</body>
</html>
