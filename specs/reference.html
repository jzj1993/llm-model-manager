<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>两级独立属性表格演示</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 16px;
    }
    .parent-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    .parent-table th,
    .parent-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }
    .parent-table th {
      background-color: #f9fafb;
      font-weight: 600;
    }
    .parent-row {
      cursor: pointer;
    }
    .parent-row:hover {
      background-color: #f3f4f6;
    }
    .expand-btn {
      display: inline-block;
      width: 20px;
      height: 20px;
      text-align: center;
      line-height: 20px;
      font-weight: bold;
    }
    .child-cell {
      padding: 0 !important;
    }
    .child-table {
      width: 100%;
      border-collapse: collapse;
      background-color: #f9fafb;
    }
    .child-table th,
    .child-table td {
      padding: 10px 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .child-table th {
      background-color: #eff6ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>两级独立属性表格（父级、子级字段不同）</h3>

    <table class="parent-table">
      <thead>
        <tr>
          <th>展开</th>
          <th>订单编号</th>
          <th>客户姓名</th>
          <th>订单状态</th>
          <th>下单时间</th>
        </tr>
      </thead>
      <tbody>
        <!-- 父行 1 -->
        <tr class="parent-row" onclick="toggleChild('child-1')">
          <td><span class="expand-btn" id="icon-1">➕</span></td>
          <td>ORDER-20260405-001</td>
          <td>张三</td>
          <td>已付款</td>
          <td>2026-04-05 10:20</td>
        </tr>
        <tr id="child-1" style="display: none">
          <td colspan="5" class="child-cell">
            <table class="child-table">
              <thead>
                <tr>
                  <th>商品ID</th>
                  <th>商品名称</th>
                  <th>单价</th>
                  <th>数量</th>
                  <th>小计</th>
                  <th>仓库</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>SKU-1001</td>
                  <td>高性能笔记本电脑</td>
                  <td>5999 元</td>
                  <td>1</td>
                  <td>5999 元</td>
                  <td>华东仓</td>
                </tr>
                <tr>
                  <td>SKU-1002</td>
                  <td>无线鼠标</td>
                  <td>129 元</td>
                  <td>1</td>
                  <td>129 元</td>
                  <td>华南仓</td>
                </tr>
              </tbody>
            </table>
          </td>
        </tr>

        <!-- 父行 2 -->
        <tr class="parent-row" onclick="toggleChild('child-2')">
          <td><span class="expand-btn" id="icon-2">➕</span></td>
          <td>ORDER-20260405-002</td>
          <td>李四</td>
          <td>待发货</td>
          <td>2026-04-05 11:10</td>
        </tr>
        <tr id="child-2" style="display: none">
          <td colspan="5" class="child-cell">
            <table class="child-table">
              <thead>
                <tr>
                  <th>商品ID</th>
                  <th>商品名称</th>
                  <th>单价</th>
                  <th>数量</th>
                  <th>小计</th>
                  <th>仓库</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>SKU-2001</td>
                  <td>机械键盘</td>
                  <td>399 元</td>
                  <td>2</td>
                  <td>798 元</td>
                  <td>北京仓</td>
                </tr>
              </tbody>
            </table>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    function toggleChild(childId) {
      const child = document.getElementById(childId)
      const icon = document.getElementById(childId.replace('child', 'icon'))

      if (child.style.display === 'none') {
        child.style.display = 'table-row'
        icon.textContent = '➖'
      } else {
        child.style.display = 'none'
        icon.textContent = '➕'
      }
    }
  </script>
</body>
</html>
